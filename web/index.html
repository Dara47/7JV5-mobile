<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="7J English Center — ระบบจัดการเรียนการสอน">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="7J English">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>7J English</title>
  <link rel="manifest" href="manifest.json">

  <!-- ปิด/ถอน Service Worker เก่า + ล้าง cache เก่าที่เคยแคชแอปไว้
       (แอปนี้ออนไลน์ตลอด ไม่ใช้ offline — build ด้วย --pwa-strategy=none จึงไม่ register SW ใหม่)
       ถ้าเจอ SW เก่าค้าง (มือถือที่เคยเข้าตอน build เสีย จะโดน SW เสิร์ฟไฟล์เสียข้าม HTTP cache)
       → ถอน SW + ล้าง cache แล้ว "รีโหลด 1 ครั้ง" (กันวนด้วย sessionStorage) ให้โหลดของใหม่สด ๆ เอง -->
  <script>
    (function () {
      try {
        if (!('serviceWorker' in navigator)) return;
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          var hadSW = regs.length > 0;
          return Promise.all(regs.map(function (r) { return r.unregister(); })).then(function () {
            if (window.caches && caches.keys) {
              return caches.keys().then(function (keys) {
                return Promise.all(keys.map(function (k) { return caches.delete(k); }));
              }).then(function () { return hadSW; });
            }
            return hadSW;
          });
        }).then(function (hadSW) {
          // เจอของเก่าค้าง → รีโหลดครั้งเดียวให้ได้เวอร์ชันสด (ไม่วน เพราะ flag ไว้ใน sessionStorage)
          if (hadSW && !sessionStorage.getItem('sw_purged')) {
            sessionStorage.setItem('sw_purged', '1');
            location.reload();
          }
        }).catch(function () {});
      } catch (e) {/* เงียบไว้ ไม่ให้กระทบการบูตแอป */}
    })();
  </script>
</head>
<body>
  <!-- หน้าจอโหลดระหว่างดาวน์โหลด/บูตแอป (กันจอขาวบนมือถือ) — Flutter จะวาดทับเมื่อพร้อม -->
  <style>
    #boot-loader {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px; padding: 24px;
      background: #FFF7ED; font-family: 'Roboto', system-ui, sans-serif; z-index: 0;
      text-align: center;
    }
    #boot-loader img { width: 96px; height: 96px; object-fit: contain; opacity: .9; }
    #boot-loader .spin {
      width: 38px; height: 38px; border: 4px solid #FDBA74;
      border-top-color: #F97316; border-radius: 50%;
      animation: boot-spin 0.9s linear infinite;
    }
    #boot-loader .txt { color: #9A3412; font-size: 14px; }
    #boot-loader .err-title { color: #B91C1C; font-size: 18px; font-weight: 700; }
    #boot-loader .err-msg { color: #7C2D12; font-size: 14px; line-height: 1.6; max-width: 360px; }
    #boot-loader .err-btn {
      margin-top: 6px; padding: 12px 28px; font-size: 15px; font-weight: 600;
      color: #fff; background: #F97316; border: none; border-radius: 999px; cursor: pointer;
    }
    #boot-loader .err-btn:active { background: #EA580C; }
    @keyframes boot-spin { to { transform: rotate(360deg); } }
  </style>
  <div id="boot-loader">
    <img src="icons/Icon-192.png" alt="7J English" onerror="this.style.display='none'">
    <div class="spin"></div>
    <div class="txt">กำลังโหลด…</div>
  </div>

  <!-- แบนเนอร์เตือนเมื่อเปิดจากเบราว์เซอร์ในแอป (LINE/Facebook/IG ฯลฯ) → แนะนำเปิดด้วย Chrome
       เครื่อง/WebView เก่าใน in-app browser มักโหลด Flutter Web ไม่ขึ้น (จอขาว) — พาออก Chrome แก้ได้
       เพิ่มอย่างเดียว ไม่แตะ logic บูตเดิม + ข้ามถ้าเปิดเป็นแอปที่ติดตั้งแล้ว (PWA standalone) -->
  <style>
    #inapp-banner {
      position: fixed; top: 0; left: 0; right: 0; z-index: 2147483647;
      background: #B91C1C; color: #fff; font-family: 'Roboto', system-ui, sans-serif;
      padding: 10px 12px; box-shadow: 0 2px 10px rgba(0,0,0,.25);
      display: flex; align-items: flex-start; gap: 10px;
    }
    #inapp-banner .ib-txt { flex: 1; font-size: 13px; line-height: 1.45; }
    #inapp-banner .ib-txt b { font-weight: 700; }
    #inapp-banner .ib-btns { display: flex; flex-direction: column; gap: 6px; }
    #inapp-banner button {
      white-space: nowrap; border: none; border-radius: 8px; padding: 8px 12px;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    #inapp-banner .ib-open { background: #fff; color: #B91C1C; }
    #inapp-banner .ib-copy { background: rgba(255,255,255,.18); color: #fff; }
    #inapp-banner .ib-close {
      background: transparent; color: #fff; font-size: 20px; line-height: 1;
      padding: 2px 6px; align-self: flex-start;
    }
  </style>
  <script>
    (function () {
      try {
        var ua = navigator.userAgent || '';
        // เปิดเป็นแอปที่ติดตั้งแล้ว (PWA standalone) → ไม่ต้องเตือน
        var standalone = (window.matchMedia &&
            window.matchMedia('(display-mode: standalone)').matches) ||
            window.navigator.standalone === true;
        if (standalone) return;
        // เบราว์เซอร์ในแอปยอดฮิต: LINE, Facebook, Messenger, Instagram, WeChat
        var inApp = /Line\/|FBAN|FBAV|FB_IAB|FBIOS|Messenger|Instagram|MicroMessenger/i.test(ua);
        if (!inApp) return;

        var url = location.href;
        function showBanner() {
          if (document.getElementById('inapp-banner')) return;
          var bar = document.createElement('div');
          bar.id = 'inapp-banner';
          bar.innerHTML =
            '<div class="ib-txt">📱 เปิดจากในแอป LINE/Facebook อาจโหลดไม่ขึ้น<br>' +
            'เพื่อใช้งานเต็มที่ กรุณา<b>เปิดด้วย Chrome</b> (แตะ ⋮ มุมขวาบน → เปิดด้วยเบราว์เซอร์)</div>' +
            '<div class="ib-btns">' +
            '<button class="ib-open">เปิด Chrome</button>' +
            '<button class="ib-copy">คัดลอกลิงก์</button>' +
            '</div>' +
            '<button class="ib-close" aria-label="ปิด">&times;</button>';
          document.body.appendChild(bar);

          bar.querySelector('.ib-close').onclick = function () { bar.remove(); };

          bar.querySelector('.ib-open').onclick = function () {
            if (/Android/i.test(ua)) {
              // เปิด URL เดิมด้วย Chrome ผ่าน Android intent (ถ้าไม่มี Chrome จะไม่ทำงาน → ใช้คัดลอกลิงก์แทน)
              window.location.href = 'intent://' + location.host + location.pathname +
                  location.search + '#Intent;scheme=https;package=com.android.chrome;end';
            } else {
              alert('แตะปุ่ม "แชร์/เปิดในเบราว์เซอร์" ของแอป แล้วเลือก Safari หรือ Chrome\n\n' +
                    'หรือกด "คัดลอกลิงก์" แล้วนำไปวางในเบราว์เซอร์');
            }
          };

          bar.querySelector('.ib-copy').onclick = function () {
            function done() { var b = bar.querySelector('.ib-copy'); if (b) b.textContent = 'คัดลอกแล้ว ✓'; }
            function fallbackCopy() {
              var t = document.createElement('textarea');
              t.value = url; document.body.appendChild(t); t.select();
              try { document.execCommand('copy'); done(); } catch (e) {}
              t.remove();
            }
            if (navigator.clipboard && navigator.clipboard.writeText) {
              navigator.clipboard.writeText(url).then(done).catch(fallbackCopy);
            } else { fallbackCopy(); }
          };
        }

        if (document.body) showBanner();
        else document.addEventListener('DOMContentLoaded', showBanner);
      } catch (e) {/* เงียบไว้ ไม่ให้กระทบการบูตแอป */}
    })();
  </script>

  <script>
    // ---- ตัวช่วยแสดงข้อความบนหน้าโหลด (ใช้ทั้งกรณีเบราว์เซอร์เก่า/โหลดนานเกิน) ----
    function bootShowError(title, msg, btnLabel, btnAction) {
      var el = document.getElementById('boot-loader');
      if (!el) return;
      var btn = btnLabel
        ? '<button class="err-btn" onclick="' + btnAction + '">' + btnLabel + '</button>'
        : '';
      el.innerHTML =
        '<img src="icons/Icon-192.png" alt="7J English" onerror="this.style.display=\'none\'">' +
        '<div class="err-title">' + title + '</div>' +
        '<div class="err-msg">' + msg + '</div>' + btn;
    }

    // ---- 1) เช็คเบราว์เซอร์เก่า: แอปต้องใช้ WebAssembly (CanvasKit) ----
    // เครื่อง/เบราว์เซอร์เก่าที่ไม่รองรับจะจอขาว → แจ้งให้อัปเดตแทน
    var browserOk = (typeof WebAssembly === 'object') &&
                    (typeof Promise !== 'undefined') &&
                    !!window.fetch;
    if (!browserOk) {
      bootShowError(
        'เบราว์เซอร์เก่าเกินไป',
        'แอปนี้ต้องใช้เบราว์เซอร์รุ่นใหม่ กรุณา<b>อัปเดต Google Chrome</b> ' +
        '(หรือเปิดด้วย Chrome แทนเบราว์เซอร์ในแอปอื่น เช่น LINE/Facebook) แล้วลองใหม่อีกครั้ง'
      );
    } else {
      // ---- 2) โหลดแอปตามปกติ + ตั้ง timeout กันค้างหน้าโหลด ----
      var booted = false;
      window.addEventListener('flutter-first-frame', function () {
        booted = true;
        var el = document.getElementById('boot-loader');
        if (el) el.remove();
      });
      // ถ้าวาดเฟรมแรกไม่สำเร็จใน 20 วินาที = โหลดนานผิดปกติ/ค้าง → ให้ทางเลือกผู้ใช้
      setTimeout(function () {
        if (booted) return;
        bootShowError(
          'โหลดนานผิดปกติ',
          'อาจเป็นเพราะอินเทอร์เน็ตช้า หรือข้อมูลแอปเวอร์ชันเก่าค้างอยู่ในเครื่อง<br>' +
          'ลองกดปุ่มด้านล่างเพื่อโหลดใหม่ ถ้ายังไม่หายให้ล้างข้อมูลเว็บไซต์/แคชแล้วเปิดใหม่',
          'โหลดใหม่', 'location.reload()'
        );
      }, 20000);

      // โหลด Flutter
      var s = document.createElement('script');
      s.src = 'flutter_bootstrap.js';
      s.async = true;
      document.body.appendChild(s);
    }
  </script>
</body>
</html>
